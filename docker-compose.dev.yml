# Dev-mode override — merged on top of docker-compose.yml by `make dev`
# (docker compose -f docker-compose.yml -f docker-compose.dev.yml ...).
# Same Postgres service as the production stack; only `app` changes: it
# builds from Dockerfile.dev and bind-mounts the source so `next dev`
# picks up edits immediately, instead of shipping a pre-built image.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "npx prisma migrate deploy && npm run dev"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
