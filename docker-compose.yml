services:
  db:
    image: postgres:15-alpine
    container_name: database
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

    volumes:
      - db_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: ./ecommerce
      dockerfile: Dockerfile

    image: ecommerce:dev
    pull_policy: build
    container_name: ecommerce
    restart: unless-stopped
    init: true
    working_dir: /app

    command:
      ["sh", "-c", "npx prisma generate && npx prisma migrate deploy && npm run dev"]

    env_file:
      - .env

    environment:
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      MEDIA_STORAGE_DRIVER: ${MEDIA_STORAGE_DRIVER:-local}
      MEDIA_LOCAL_ROOT: ${MEDIA_LOCAL_ROOT:-/app/uploads}
      MEDIA_PUBLIC_PATH: ${MEDIA_PUBLIC_PATH:-/media}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:3000}
      MEDIA_MAX_FILE_SIZE_BYTES: ${MEDIA_MAX_FILE_SIZE_BYTES:-5242880}
      MEDIA_ALLOWED_MIME_TYPES: ${MEDIA_ALLOWED_MIME_TYPES:-image/jpeg,image/png,image/webp}
      MEDIA_MAX_IMAGES_PER_PRODUCT: ${MEDIA_MAX_IMAGES_PER_PRODUCT:-8}
      MEDIA_MAX_IMAGE_PIXELS: ${MEDIA_MAX_IMAGE_PIXELS:-40000000}

    ports:
      - "3000:8080"

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./ecommerce:/app
      - ecommerce_node_modules:/app/node_modules
      - ecommerce_next:/app/.next
      - media_uploads:/app/uploads

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
    name: db_data

  ecommerce_node_modules:
    name: ecommerce_node_modules

  ecommerce_next:
    name: ecommerce_next

  media_uploads:
    name: media_uploads
