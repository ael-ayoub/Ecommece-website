services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  # Catches outgoing emails in dev (OTP codes, password resets) — no real sending.
  # Web UI at http://localhost:${MAILHOG_WEB_PORT:-8025}
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    restart: unless-stopped
    environment:
      # Actually rebinds MailHog's internal SMTP listener — not just cosmetic.
      MH_SMTP_BIND_ADDR: 0.0.0.0:${MAILHOG_SMTP_PORT:-1025}
    ports:
      - "127.0.0.1:${MAILHOG_WEB_PORT:-8025}:8025"
    expose:
      - "${MAILHOG_SMTP_PORT:-1025}"

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Backend actually reads process.env.PORT to bind (see backend/src/index.ts) —
      # this is a real, functional variable, not just a label.
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: postgres://${POSTGRES_USER:-ecommerce}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ecommerce}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN in .env}
      ADMIN_JWT_ACCESS_SECRET: ${ADMIN_JWT_ACCESS_SECRET:?set ADMIN_JWT_ACCESS_SECRET in .env}
      ADMIN_JWT_ACCESS_TTL: ${ADMIN_JWT_ACCESS_TTL:-15m}
      ADMIN_REFRESH_TOKEN_TTL_DAYS: ${ADMIN_REFRESH_TOKEN_TTL_DAYS:-30}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      GUEST_COOKIE_TTL_DAYS: ${GUEST_COOKIE_TTL_DAYS:-365}
      COOKIE_SECRET: ${COOKIE_SECRET:?set COOKIE_SECRET in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      OTP_TTL_MINUTES: ${OTP_TTL_MINUTES:-10}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${MAILHOG_SMTP_PORT:-1025}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@example.com}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      RATE_LIMIT_GLOBAL_MAX: ${RATE_LIMIT_GLOBAL_MAX:-100}
      RATE_LIMIT_GLOBAL_WINDOW: ${RATE_LIMIT_GLOBAL_WINDOW:-1 minute}
      # Consumed by backend/src/db/seed.ts — running `make prisma-seed` always
      # creates/matches this exact admin account, sourced from .env, never hardcoded.
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?set SEED_ADMIN_PASSWORD in .env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    expose:
      - "${BACKEND_PORT:-3000}"

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      BACKEND_URL: http://backend:${BACKEND_PORT:-3000}
    depends_on:
      - backend
    # Astro's "preview" port is hardcoded in frontend/package.json's script, not env-driven —
    # changing this alone would desync from what the app actually listens on. Leave as-is
    # unless frontend/package.json is also updated to read a PORT variable.
    expose:
      - "4321"

  # Admin panel SPA — served at /admin/* (Caddy strips the prefix before forwarding here).
  admin:
    build:
      context: ./admin
    container_name: admin
    restart: unless-stopped
    depends_on:
      - backend
    # Same caveat as frontend above: `serve -l 4322` is hardcoded in admin/Dockerfile's CMD.
    expose:
      - "4322"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
      BACKEND_PORT: ${BACKEND_PORT:-3000}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - admin
      - backend

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
